<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Snake - Advanced IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="hud">
            <div class="stat">SCORE <span id="score">0</span></div>
            <div class="stat">COINS <span id="coins">0</span></div>
            <div class="stat ia-status">IA THEME: <span id="ia-current-class">WAITING...</span></div>
        </div>

        <div class="game-viewport">
            <!-- IA Webcam View (Floating) -->
            <div id="webcam-container" class="webcam-preview border-neon"></div>
            
            <canvas id="gameCanvas" width="800" height="800"></canvas>

            <!-- Menus -->
            <div id="overlay-menu" class="menu-overlay">
                
                <!-- Main Menu with Difficulty -->
                <div id="main-menu" class="menu-content">
                    <h1 class="logo-neon">NEON CORE</h1>
                    <p class="subtitle">SNAKE SYSTEM ORCHESTRATION</p>
                    
                    <div class="difficulty-selector">
                        <p>ESCOLHA A DIFICULDADE:</p>
                        <div class="diff-btns">
                            <button class="btn-diff active" data-diff="easy">FÁCIL</button>
                            <button class="btn-diff" data-diff="medium">MÉDIO</button>
                            <button class="btn-diff" data-diff="hard">DIFÍCIL</button>
                        </div>
                    </div>

                    <div class="menu-actions mt-20">
                        <button id="btn-play" class="btn-neon">INICIAR TERMINAL</button>
                        <button id="btn-setup-ia" class="btn-secondary">CONFIGURAR IA (TEMA DINÂMICO)</button>
                    </div>
                </div>

                <!-- Game Over -->
                <div id="game-over" class="menu-content hidden">
                    <h1 class="text-danger">SYSTEM CRASH</h1>
                    <div id="stats-log" class="log-table-container"></div>
                    <div class="menu-actions">
                        <button id="btn-restart" class="btn-neon">REBOOT</button>
                        <button id="btn-download-json" class="btn-secondary">EXPORT JSON</button>
                        <button id="btn-back-menu" class="btn-secondary">BACK TO CORE</button>
                    </div>
                </div>

                <!-- IA Configuration Overlay -->
                <div id="ia-menu" class="menu-content hidden">
                    <h2 class="title-minimal">TEACHABLE MACHINE CLOUD</h2>
                    <p>Suas classes determinarão a cor do mundo!</p>
                    <input type="text" id="ia-model-url" placeholder="https://teachablemachine.withgoogle.com/models/..." class="neon-input">
                    <div class="ia-controls mt-20">
                        <button id="btn-start-ia" class="btn-neon">CONECTAR IA</button>
                        <button id="btn-close-ia" class="btn-secondary">VOLTAR</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="flow-container">
            <div id="antigravity-bar" class="flow-fill"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
