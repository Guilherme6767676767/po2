<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Snake - IA Edition</title>
    <!-- Modern Tech Stack -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Minimal HUD -->
        <div class="hud">
            <div class="stat">SCORE <span id="score">0</span></div>
            <div class="stat">COINS <span id="coins">0</span></div>
            <div class="stat ia-status">IA: <span id="ia-status-label">OFF</span></div>
        </div>

        <div class="game-viewport">
            <!-- IA Webcam View (Floating) -->
            <div id="webcam-container" class="webcam-preview border-neon"></div>
            
            <canvas id="gameCanvas" width="800" height="800"></canvas>

            <!-- Menus -->
            <div id="overlay-menu" class="menu-overlay">
                <div id="main-menu" class="menu-content">
                    <h1 class="logo-neon">NEON SNAKE</h1>
                    <p class="subtitle">PREMIUM IA-CONTROLLED EXPERIENCE</p>
                    
                    <div class="menu-actions">
                        <button id="btn-play" class="btn-neon">INICIAR JOGO</button>
                        <button id="btn-setup-ia" class="btn-secondary">CONFIGURAR IA</button>
                        <button id="btn-worlds" class="btn-secondary">REVISAR MUNDOS</button>
                    </div>
                </div>

                <div id="world-menu" class="menu-content hidden">
                    <h2 class="title-minimal">MUNDOS</h2>
                    <div class="world-options">
                        <div class="world-card border-neon active" data-world="neon">VOID NEON</div>
                        <div class="world-card border-neon" data-world="crystal">CRYSTAL CAVE</div>
                        <div class="world-card border-neon" data-world="lava">LAVA CORE</div>
                    </div>
                    <button id="btn-close-worlds" class="btn-secondary mt-20">VOLTAR</button>
                </div>

                <div id="game-over" class="menu-content hidden">
                    <h1 class="text-danger">TERMINAL FAILURE</h1>
                    <div id="stats-log" class="log-table-container">
                        <!-- Table Machine output will be here -->
                    </div>
                    <div class="menu-actions">
                        <button id="btn-restart" class="btn-neon">REBOOT</button>
                        <button id="btn-download-json" class="btn-secondary">EXPORT DATA (.JSON)</button>
                        <button id="btn-back-menu" class="btn-secondary">EXIT TO CORE</button>
                    </div>
                </div>

                <!-- IA Configuration Overlay -->
                <div id="ia-menu" class="menu-content hidden">
                    <h2 class="title-minimal">TEACHABLE MACHINE</h2>
                    <p>Insira a URL do seu modelo exportado:</p>
                    <input type="text" id="ia-model-url" placeholder="https://teachablemachine.withgoogle.com/models/..." class="neon-input">
                    <div class="ia-controls mt-20">
                        <button id="btn-start-ia" class="btn-neon">ATIVAR WEBCAM & IA</button>
                        <button id="btn-close-ia" class="btn-secondary">VOLTAR</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress Bar (Antigravity Flow) -->
        <div class="flow-container">
            <div id="antigravity-bar" class="flow-fill"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
